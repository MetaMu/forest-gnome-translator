<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Forest Gnome Covenant Scroll Generator</title>

<style>

body{
background:#bfa56a;
font-family:Georgia,serif;
margin:0;
padding:40px;
}

h1{
text-align:center;
margin-bottom:10px;
}

.controls{
max-width:500px;
margin:auto;
margin-bottom:30px;
}

textarea{
width:100%;
height:120px;
font-size:18px;
padding:10px;
border-radius:10px;
border:1px solid #8c6a35;
}

button{
margin-top:10px;
padding:10px 14px;
font-size:16px;
border:none;
border-radius:8px;
background:#4b5f3c;
color:white;
cursor:pointer;
}

.scroll{
margin:auto;
max-width:800px;
padding:80px 60px;
background:#f4e5b9;
border-radius:20px;
box-shadow:
inset 0 0 40px rgba(0,0,0,.2),
0 20px 40px rgba(0,0,0,.4);
}

.output{
text-align:center;
font-size:42px;
line-height:1.6;
letter-spacing:4px;
}

.subtitle{
text-align:center;
margin-top:20px;
font-size:14px;
letter-spacing:2px;
}

</style>
</head>


<body>

<h1>Forest Gnome Covenant Scroll Generator</h1>

<div class="controls">

<textarea id="textInput"
placeholder="Type your message..."></textarea>

<button onclick="renderScroll()">
Generate Scroll
</button>

</div>


<div class="scroll">

<div id="gnommishOutput" class="output"></div>

<div class="subtitle">
Human Tongue Translation
<br>
<span id="englishOutput"></span>
</div>

</div>


<script>

function renderScroll(){

const input =
document.getElementById("textInput").value

const output =
document.getElementById("gnommishOutput")

const english =
document.getElementById("englishOutput")

output.innerText = input.toUpperCase()

english.innerText = input

}

</script>


</body>
</html>
